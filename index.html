<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAM machnie</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>
    <div id="lewy">
        <div id="procesor">
            <h3>PROCESSOR</h3>
            <label for="instruction">Instruction</label>
            <input type="text" name="instruction" id=""> <br><br>
            <label for="argument">Argument</label>
            <input type="text" name="argument" id="">
        </div>

        <div id="memory">
            <table>
                <tr>
                    <th colspan="2" style="text-align: center;">MEMORY</th>
                </tr>
                <tr>
                    <td>Address</td>
                    <td>Value</td>
                </tr>
                <tr>
                    <td>0</td>
                    <td></td>
                </tr>
                <tr>
                    <td>1</td>
                    <td></td>
                </tr>
                <tr>
                    <td>2</td>
                    <td></td>
                </tr>
                <tr>
                    <td>3</td>
                    <td></td>
                </tr>
                <tr>
                    <td>4</td>
                    <td></td>
                </tr>
                <tr>
                    <td>5</td>
                    <td></td>
                </tr>
                <tr>
                    <td>6</td>
                    <td></td>
                </tr>
                <tr>
                    <td>7</td>
                    <td></td>
                </tr>
                <tr>
                    <td>8</td>
                    <td></td>
                </tr>
                <tr>
                    <td>9</td>
                    <td></td>
                </tr>
                <tr>
                    <td>10</td>
                    <td></td>
                </tr>
            </table>
        </div>
    </div>

    <div id="prawy">
        <div id="wejscie">
            <h3>Taśma wejścia</h3>

            <div class="tasma">
                <div class="indeksy">
                    <span>0</span>
                    <span>1</span>
                    <span>2</span>
                    <span>3</span>
                    <span>4</span>
                    <span>5</span>
                    <span>6</span>
                    <span>7</span>
                    <span>8</span>
                    <span>9</span>
                </div>

                <div class="pola">
                    <input type="number" id="in0" value="0">
                    <input type="number" id="in1" value="0">
                    <input type="number" id="in2" value="0">
                    <input type="number" id="in3" value="0">
                    <input type="number" id="in4" value="0">
                    <input type="number" id="in5" value="0">
                    <input type="number" id="in6" value="0">
                    <input type="number" id="in7" value="0">
                    <input type="number" id="in8" value="0">
                    <input type="number" id="in9" value="0">
                </div>
            </div>
        </div>
        <div id="wyjscie">
            <h3>Taśma wyjścia</h3>
        </div>
        <div id="program"></div>
    </div>
</body>
</html>
