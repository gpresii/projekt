<!DOCTYPE html>
<html lang="pl">
<head>

            <input type="text" name="instruction" id=""> <br><br>

            <input type="text" name="argument" id="">

        <div id="memory">
            <table>

                    <th colspan="2" style="text-align: center;">MEMORY</th>
                </tr>

                    <td>Address</td>

                </tr>

                    <td>1</td>
                    <td></td>
                </tr>
                <tr>
                    <td>2</td>
                    <td></td>
                </tr>
                <tr>
                    <td>3</td>
                    <td></td>
                </tr>
                <tr>
                    <td>4</td>
                    <td></td>
                </tr>
                <tr>
                    <td>5</td>
                    <td></td>
                </tr>
                <tr>
                    <td>6</td>
                    <td></td>
                </tr>
                <tr>
                    <td>7</td>
                    <td></td>
                </tr>
                <tr>
                    <td>8</td>
                    <td></td>
                </tr>
                <tr>
                    <td>9</td>
                    <td></td>
                </tr>
                <tr>
                    <td>10</td>
                    <td></td>
                </tr>
            </table>
        </div>
    </div>

    <div id="prawy">
        <div id="wejscie"></div>
        <div id="program"></div>
        <div id="wyjscie"></div>
    </div>
</body>
</html>
