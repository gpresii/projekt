<!-- index.html -->
<!DOCTYPE html>
<html lang="pl">
<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>RAM Machine</title>

    <link
        rel="stylesheet"
        href="style.css"
    >

</head>

<body>

    <!-- LEWA STRONA -->

    <div id="lewy">

        <!-- PROCESOR -->

        <div id="procesor">

            <h3>PROCESSOR</h3>

            <label>Instruction</label>

            <div id="instr">-</div>

            <br>

            <label>Argument</label>

            <div id="arg">-</div>

        </div>

        <br>

        <!-- MEMORY -->

        <div id="memory">

            <table>

                <thead>

                    <tr>
                        <th colspan="2">
                            MEMORY
                        </th>
                    </tr>

                    <tr>
                        <th>Address</th>
                        <th>Value</th>
                    </tr>

                </thead>

                <tbody id="memoryBody">

                </tbody>

            </table>

        </div>

    </div>

    <!-- PRAWA STRONA -->

    <div id="prawy">

        <!-- WEJŚCIE -->

        <div id="wejscie">

            <h3>Taśma wejścia</h3>

            <div class="tasma">

                <div class="indeksy">

                    <span>0</span>
                    <span>1</span>
                    <span>2</span>
                    <span>3</span>
                    <span>4</span>
                    <span>5</span>
                    <span>6</span>
                    <span>7</span>
                    <span>8</span>
                    <span>9</span>

                </div>

                <div class="pola">

                    <input type="number" id="in0" value="0">
                    <input type="number" id="in1" value="0">
                    <input type="number" id="in2" value="0">
                    <input type="number" id="in3" value="0">
                    <input type="number" id="in4" value="0">
                    <input type="number" id="in5" value="0">
                    <input type="number" id="in6" value="0">
                    <input type="number" id="in7" value="0">
                    <input type="number" id="in8" value="0">
                    <input type="number" id="in9" value="0">

                </div>

            </div>

        </div>

        <!-- PRZYCISKI -->

        <div id="przyciski">

            <button
                id="saveBtn"
                class="button_pierwsze"
            >
                Zapisz program
            </button>

            <button
                id="loadBtn"
                class="button_pierwsze"
            >
                Wczytaj program
            </button>

            <button
                id="runBtn"
                class="button_drugie"
            >
                Uruchom
            </button>

            <button
                id="stepBtn"
                class="button_drugie"
            >
                Krok
            </button>

            <button
                id="resetBtn"
                class="button_drugie"
            >
                Reset
            </button>

        </div>

        <br>

        <!-- PROGRAM -->

        <div id="program">

            <table id="program_tabela">

                <thead>

                    <tr>
                        <th>LP</th>
                        <th>Etykieta</th>
                        <th>Instrukcja</th>
                        <th>Parametr</th>
                        <th>Komentarz</th>
                        <th>Akcje</th>
                    </tr>

                </thead>

                <tbody id="programBody">

                </tbody>

            </table>

        </div>

        <!-- WYJŚCIE -->

        <div id="wyjscie">

            <h3>Taśma wyjścia</h3>

            <div class="tasma">

                <div class="indeksy">

                    <span>0</span>
                    <span>1</span>
                    <span>2</span>
                    <span>3</span>
                    <span>4</span>
                    <span>5</span>
                    <span>6</span>
                    <span>7</span>
                    <span>8</span>
                    <span>9</span>

                </div>

                <div class="pola">

                    <input type="number" id="out0" readonly>
                    <input type="number" id="out1" readonly>
                    <input type="number" id="out2" readonly>
                    <input type="number" id="out3" readonly>
                    <input type="number" id="out4" readonly>
                    <input type="number" id="out5" readonly>
                    <input type="number" id="out6" readonly>
                    <input type="number" id="out7" readonly>
                    <input type="number" id="out8" readonly>
                    <input type="number" id="out9" readonly>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
